name: CI

# PR/branch gating for the monorepo. Runs typecheck, lint, and
# build across all workspaces.
#
# History note: the @chounting/web app previously carried lint
# errors that blocked both `pnpm lint` and `next build` for the
# web workspace. Those errors were @/db/adminClient violations
# under apps/web/src/agent/*. The narrow `src/agent/**` eslint
# exemption shipped in `e719d02` (Q33 partial-resolution arc,
# 2026-04-30) cleared the path. The lint job was subsequently
# narrowed to web + demo at 6c4ce42 because @chounting/ui had
# a "lint": "eslint" script declared but no eslint.config.*
# file wired (scaffolded empty at 000d6f7). Item 47 closed that
# gap by mirroring apps/demo's flat-config in packages/ui;
# lint and build now run unfiltered across all workspaces.
#
# Security note: this workflow does not consume any user-controlled
# context (no github.event.issue.*, github.event.pull_request.title,
# commit message bodies, etc.). Only github.workflow, github.ref,
# github.sha, and runner.os are referenced — all platform-trusted.
#
# The daily verify-audit-coverage workflow runs separately (see
# .github/workflows/verify-audit-coverage.yml). It needs Supabase
# and is not duplicated here.

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck (all workspaces)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-typecheck-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-typecheck-

      - name: Type-check
        run: pnpm exec turbo run type-check

  lint:
    name: lint (all workspaces)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-lint-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-lint-

      - name: Lint
        run: pnpm exec turbo run lint

  build:
    name: build (all workspaces)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Cache turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-build-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-build-

      - name: Build
        run: pnpm exec turbo run build
